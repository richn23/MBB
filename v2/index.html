<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meaning Beyond Brands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="/images/Background-base.png" />
  <link rel="preload" as="image" href="/images/water-sparkle-wide.jpg" />
  <link rel="stylesheet" href="/v2/style.css" />
</head>
<body>

  <!-- ── Environment layers ── -->
  <div class="l l-base"                    aria-hidden="true"></div>
  <div class="l l-drift"    id="lDrift"    aria-hidden="true"></div>
  <div class="l l-pearl"    id="lPearl"    aria-hidden="true"></div>
  <div class="l l-water"    id="lWater"    aria-hidden="true"></div>
  <div class="l l-caustics" id="lCaustics" aria-hidden="true">
    <span class="cs cs--a"></span>
    <span class="cs cs--b"></span>
    <span class="cs cs--c"></span>
    <span class="cs cs--d"></span>
  </div>
  <div class="l l-finish"   id="lFinish"   aria-hidden="true"></div>

  <!-- ── Site header — hidden at top, fades in after hero dissolves ── -->
  <header class="site-header" id="siteHeader">
    <div class="sh-inner">

      <div class="sh-left">
        <img src="/Assets/emblem.jpeg" alt="" class="sh-emblem" aria-hidden="true"
             width="32" height="32" />
        <div class="sh-brand">
          <span class="sh-name">Meaning Beyond Brands</span>
          <span class="sh-tagline">Strategy · Storytelling · Significance</span>
        </div>
      </div>

      <nav class="sh-right">
        <a href="#" class="sh-connect">Let's Connect</a>
      </nav>

    </div>
  </header>

  <!-- ── Hero: logo + two-line engraved text ── -->
  <div class="logo-stage" id="logoStage">

    <div class="logo-mark">
      <img src="/Assets/emblem.jpeg" alt="" class="logo-emblem"
           width="300" height="300" aria-hidden="true" />
    </div>

    <div class="hero-copy">
      <p class="hero-line hero-line-1" id="heroLine1" aria-hidden="true"></p>
      <p class="hero-line hero-line-2" id="heroLine2" aria-hidden="true"></p>
    </div>

  </div>

  <!-- ── Pearl zone: Our Purpose stationery card ── -->
  <div class="content-block card-pearl" id="cardPearl" aria-hidden="true">
    <div class="pearl-card">

      <!-- Compass star — embossed into paper -->
      <div class="pc-star-wrap">
        <img src="/Assets/compass-star.png" alt="" class="pc-star"
             width="40" height="40" aria-hidden="true" />
      </div>

      <!-- Heading -->
      <p class="pc-heading">Our Purpose</p>

      <!-- Gold divider: line ✦ line -->
      <div class="pc-divider">
        <span class="pd-line"></span>
        <span class="pd-gem">✦</span>
        <span class="pd-line"></span>
      </div>

      <!-- Body — letterpress feel -->
      <p class="pc-body">We help luxury and premium brands create meaningful
        growth through strategy, storytelling, and human connection.</p>

      <!-- Footer hairline -->
      <div class="pc-foot"></div>

    </div>
  </div>

  <!-- ── Water zone: framework placeholder ── -->
  <div class="content-block card-framework" id="cardFramework" aria-hidden="true">
    <div class="fw-box">
      <span class="fw-label">Framework</span>
    </div>
  </div>

  <!-- ── Calm finish: profile + contact ── -->
  <div class="content-block card-finish" id="cardFinish" aria-hidden="true">
    <div class="cf-portrait"></div>
    <p class="cf-name">— Name —</p>
    <p class="cf-contact">email · instagram</p>
  </div>

  <!-- Scroll canvas: 650vh -->
  <div class="scroll-canvas" aria-hidden="true"></div>

  <script src="/v2/script.js"></script>
</body>
</html>
