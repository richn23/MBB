<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meaning Beyond Brands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="../images/Background-base.png" />
  <link rel="preload" as="image" href="../images/water-sparkle-clean.jpg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Environment layers -->
  <div class="l l-base"     aria-hidden="true"></div>
  <div class="l l-drift"    aria-hidden="true"></div>
  <div class="l l-pearl"    id="lPearl"    aria-hidden="true"></div>
  <div class="l l-water"    id="lWater"    aria-hidden="true"></div>
  <div class="l l-caustics" id="lCaustics" aria-hidden="true">
    <span class="cs cs--a"></span>
    <span class="cs cs--b"></span>
    <span class="cs cs--c"></span>
    <span class="cs cs--d"></span>
  </div>
  <div class="l l-finish"   id="lFinish"   aria-hidden="true"></div>

  <!-- Hero: logo + engraved text — fades as one unit -->
  <div class="logo-stage" id="logoStage">

    <div class="logo-mark">
      <img
        src="../Assets/emblem.jpeg"
        alt=""
        class="logo-emblem"
        width="300"
        height="300"
        aria-hidden="true"
      />
    </div>

    <div class="hero-copy">
      <p class="hero-line" id="heroLine" aria-hidden="true"></p>
    </div>

  </div>

  <!-- Scroll canvas -->
  <div class="scroll-canvas" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
